# ARR Scripts Config File
# TIP: Create/duplicate this file as many times as needed to support multiple ARR app instances... 
# TIP: Keep the files named as <file_name>.conf and place it in the /config folder (do not use spaces in the file name...)

# ARR App API Configurations
sonarrUrl="http://localhost:8989" # Sonarr URL
sonarrApiKey="" # Sonarr API Key
radarrUrl="http://localhost:7878" # Radarr URL
radarrApiKey="" # Radarr API Key
lidarrUrl="http://localhost:8686" # Lidarr URL 
lidarrApiKey="" # Lidarr API Key

# QueueCleaner Script Configuration
enableQueueCleaner="true"
queueCleanerScriptInterval="15m"
removeFromClient="true"
blocklist="true"
skipRedownload="false"

# ScoreCleaner Script Configuration
enableScoreCleaner="false"
scoreCleanerScriptInterval="30m"
dryRun="true"
# (Uses QueueCleaner settings for removeFromClient, blocklist, and skipRedownload)

# Huntarr Configuration
enableHuntarr="true" #  true = enabled :: Enables the script to run
huntarrScriptInterval="5s" # Specifies the frequency to run, ie: 1d or 1h or 25m :: Recommend 5s or less, the script is desgined to not overload your system by only allowing 3 items to be processed at any given time...
huntarrItemSearchIntervalInDays="30" # Number of days between re-searching a previously searched item... Recommend 30 days"
huntarrDailyApiSearchLimit="5000" # Number of searches allowed per day

# Radarr-Invalid-Movie-Auto-Cleaner Configuration
enableInvalidMoviesAutoCleaner="true" # true = enabled :: Enables the script to run
invalidMoviesAutoCleanerScriptInterval="1h" # Specifies the frequency to run, ie: 1d or 1h or 25m

# Sonarr/Radarr-UnmappedFolderCleaner Configuration
enableUnmappedFolderCleaner="true" # true = enabled :: Enables the script to run
unmappedFolderCleanerScriptInterval="1h" # Specifies the frequency to run, ie: 1d or 1h or 25m

# Sonarr-Invalid-Series-Auto-Cleaner Configuration
enableInvalidSeriesAutoCleaner="true" # true = enabled :: Enables the script to run
invalidSeriesAutoCleanerScriptInterval="1h" # Specifies the frequency to run, ie: 1d or 1h or 25m

# Sonarr-DailySeriesEpisodeTrimmer Configuration
enableDailySeriesEpisodeTrimmer="true" # true = enabled :: Enables the script to run
dailySeriesEpisodeTrimmerScriptInterval="12h" # Specifies the frequency to run, ie: 1d or 1h or 25m
maximumDailyEpisodes="14" # number of episodes to keep when using DailySeriesEpisodeTrimmer script
sonarrSeriesEpisodeTrimmerTag="daily" # set to a single sonarr series tag (case sensitive). This allows the script to process non-daily series type series that have a matching tag. For non-daily series, the entire season is kept and the maximum episodes setting is ignored.

# Lidarr-MusicAutomator Configuration
enableLidarrMusicAutomator="true" # true = enabled :: Enables the script to run
lidarrMusicAutomatorScriptInterval="1h" # Specifies the frequency to run, ie: 1d or 1h or 25m
incompleteDownloadPath="/path" # Set to incomplete/temporary download path :: DO NOT INCLUDE TRAILING "/"
completeDownloadPath="/path" # Set to compelete download path (this path must be accessible in Lidarr, using the exact same file path...) :: DO NOT INCLUDE TRAILING "/"
completedSearchIdLocation="/config/lidarr/searched" # Only change if needed...
arl="" # Deezer ARL Key for authentication

# Lidarr-MusicVideoAutomator Configuration
lidarrMusicVideoAutomator="true" # true = enabled :: Enables the script to run
lidarrMusicVideoAutomatorInterval="1h" # Specifies the frequency to run, ie: 1d or 1h or 25m
lidarrMusicVideoTempDownloadPath="/path/videos"  # Set to incomplete/temporary download path :: DO NOT INCLUDE TRAILING "/"
lidarrMusicVideoLibrary="/path/music-videos"  # Set to compelete download path  :: DO NOT INCLUDE TRAILING "/"
logFolder="/config/tidal" # Only change if needed...
tidalCountryCode="US" # Only change if needed...
musicVideoFormat="mp4" # mp4 or mkv :: choose which format you'd prefer
enableLiveVideos="false" # true or false :: set to false to disable downloading Live videos
enableLyricVideos="false" # true or false :: set to false to disable downloading Lyric videos
enableVisualizerVideos="false" # true or false :: set to false to disable downloading Visualizer videos
enableBehindTheScenesVideos="false" # true or false :: set to false to disable downloading Behind the Scenes videos
enableInterviewVideos="false" # true or false :: set to false to disable downloading Interview videos
enableEpisodeVideos="false" # true or false :: set to false to disable downloading Episode videos
requireMinimumVideoQaulity="FHD" # FHD or HD or All :: This setting only keeps videos that meet a minimum video quality

# ---------------------------------------------------------
# LOCAL OPS CUSTOM WRAPPERS
# The functions below override default behaviors in the .bash scripts
# without needing to modify the upstream source files directly.
# ---------------------------------------------------------

# Wrapper for ArlSetup to verify validity on every loop (uses discordWebhookUrl if set)
ArlSetup() {
    # Original logic (matching Lidarr-MusicAutomator.bash v2.3)
    if [ -z "$arl" ]; then
        log "ERROR :: ARL Key is missing!"
        log "ERROR :: Please correct for script to continue running..."
        log "ERROR :: Exiting..."
        exit
    fi
    if [ ! -d "$deemixFolder" ]; then
        log "Creating Deemix Config folder"
        mkdir -p "$deemixFolder"
    fi
    if [ -f "$deemixFolder/.arl" ]; then
        log "Deleting ARL"
        rm "$deemixFolder/.arl"
    fi
    if [ ! -f "$deemixFolder/.arl" ]; then
        log "Creating ARL file"
        echo -n "$arl" > "$deemixFolder/.arl"
        chmod 777 "$deemixFolder/.arl"
    fi

    if [ -f "/config/config/config.json" ]; then
        if [ -f "$deemixFolder/config.json" ]; then
          log "Importing custom deemix config"
          rm "$deemixFolder/config.json"
          cp "/config/config/config.json" "$deemixFolder/config.json"
          chmod 777 "$deemixFolder/config.json"
        fi
    fi

    # Proactive Validity Check
    if [ ! -z "$discordWebhookUrl" ]; then
        log "Verifying ARL token validity..."
        local arl_user=$(curl -s -X POST "https://www.deezer.com/ajax/gw-light.php?method=deezer.getUserData&api_version=1.0&api_token=" -b "arl=$arl" -d '{}' | jq -r .results.USER.USER_ID 2>/dev/null)
        
        if [ "$arl_user" == "0" ] || [ -z "$arl_user" ]; then
            log "ERROR :: ARL TOKEN EXPIRED or INVALID! Sending Discord notification..."
            local payload="{\"embeds\": [{\"title\": \"🚨 ARL TOKEN EXPIRED\", \"description\": \"MusicAutomator cannot authenticate with Deezer. Please update the ARL token in settings.conf.\", \"color\": 15158332}]}"
            curl -s -H "Content-Type: application/json" -X POST -d "$payload" "$discordWebhookUrl" > /dev/null
        else
            log "ARL Token is valid (User ID: $arl_user)."
        fi
    fi
}

# Wrapper for HuntarrProcess to prioritize Season Pack searches for Sonarr
HuntarrProcess () {
    
    # Create base directory for various functions/process
    if [ ! -d "/config/huntarr" ]; then
        mkdir -p "/config/huntarr" 
        chown ${PUID:-1000}:${PGID:-1000} "/config/huntarr"
    fi

    # Indexer API Limit Process
    HuntarrAPILimitFile

    # check if API limit has been reached
    if [ -f "/config/huntarr/$apiLimitFile" ]; then
        currentApiCounter=$(cat "/config/huntarr/$apiLimitFile")
        if [ $currentApiCounter -ge $huntarrDailyApiSearchLimit ]; then
            log "$arrApp :: Daily API Limit reached... "
            return
        fi
    fi

    # Check if Arr application is too busy...
    if [ -f "/config/huntarr-break" ]; then
        rm "/config/huntarr-break"
    fi
    ArrAppStatusCheck
    if [ -f "/config/huntarr-break" ]; then
        rm "/config/huntarr-break"
        log "$arrApp App busy..."
        return
    fi

    # Gather Missing and Cutoff items for processing...
    # Radarr
    if [ "$arrApp" == "Radarr" ]; then
        missingList=$(wget --timeout=0 -q -O - "$arrUrl/api/$arrApiVersion/wanted/missing?page=1&pagesize=10&sortDirection=ascending&sortKey=movies.lastSearchTime&monitored=true&apikey=${arrApiKey}" | jq -r '.records[]')
        cutoffList=$(wget --timeout=0 -q -O - "$arrUrl/api/$arrApiVersion/wanted/cutoff?page=1&pagesize=10&sortDirection=ascending&sortKey=movies.lastSearchTime&monitored=true&apikey=${arrApiKey}" | jq -r '.records[]')
    fi

    # Sonarr
    if [ "$arrApp" == "Sonarr" ]; then
        missingList=$(wget --timeout=0 -q -O - "$arrUrl/api/$arrApiVersion/wanted/missing?page=1&pagesize=10&sortDirection=ascending&sortKey=episodes.lastSearchTime&monitored=true&apikey=${arrApiKey}" | jq -r '.records[]')
        cutoffList=$(wget --timeout=0 -q -O - "$arrUrl/api/$arrApiVersion/wanted/cutoff?page=1&pagesize=10&sortDirection=ascending&sortKey=episodes.lastSearchTime&monitored=true&apikey=${arrApiKey}" | jq -r '.records[]')  
    fi

    arrItemListData=$(echo "$missingList" "$cutoffList")
    arrItemIds=$(echo "$arrItemListData" | jq -r .id)

    # Begin Processing Missing and Cutoff items
    for arrItemId in $(echo "$arrItemIds"); do
        # check if API limit has been reached
        if [ -f "/config/huntarr/$apiLimitFile" ]; then
            currentApiCounter=$(cat "/config/huntarr/$apiLimitFile")
            if [ $currentApiCounter -ge $huntarrDailyApiSearchLimit ]; then
                log "$arrApp :: Daily API Limit reached..."
                break
            fi
        fi

        arrItemData=$(echo "$arrItemListData" | jq -r "select(.id==$arrItemId)")

        # SONARR SEASON PACK OVERRIDE LOGIC
        if [ "$arrApp" == "Sonarr" ]; then
            sonarrSeriesId=$(echo "$arrItemData" | jq -r .seriesId)
            sonarrSeasonNumber=$(echo "$arrItemData" | jq -r .seasonNumber)
            lockFileId="${sonarrSeriesId}-${sonarrSeasonNumber}"
        else
            lockFileId="$arrItemId"
        fi

        # Check for previous search
        if [ -f "/config/huntarr/$settingsFileName/$arrApp/$lockFileId" ]; then
            continue
        fi

        # Check if Arr application is too busy...
        ArrAppStatusCheck
        if [ -f "/config/huntarr-break" ]; then
            rm "/config/huntarr-break"
            log "$arrApp :: $arrApp App busy..."
            return
        fi   

        # Perform Search
        arrItemTitle=$(echo "$arrItemData" | jq -r .title)
        
        # Radarr
        if [ "$arrApp" == "Radarr" ]; then
            log "$arrApp :: $arrItemTitle ($lockFileId) :: Searching..."
            automatedSearchTrigger=$(curl -s "$arrUrl/api/$arrApiVersion/command" -X POST -H 'Content-Type: application/json' -H "X-Api-Key: $arrApiKey" --data-raw "{\"name\":\"MoviesSearch\",\"movieIds\":[$arrItemId]}")
        fi

        # Sonarr
        if [ "$arrApp" == "Sonarr" ]; then
            log "$arrApp :: $arrItemTitle (Series: $sonarrSeriesId, Season: $sonarrSeasonNumber) :: Searching for Season Pack..."
            automatedSearchTrigger=$(curl -s "$arrUrl/api/$arrApiVersion/command" -X POST -H 'Content-Type: application/json' -H "X-Api-Key: $arrApiKey" --data-raw "{\"name\":\"SeasonSearch\",\"seriesId\":$sonarrSeriesId,\"seasonNumber\":$sonarrSeasonNumber}")
        fi

        # update API search count
        echo -n "$(($currentApiCounter + 1))" > "/config/huntarr/$apiLimitFile"

        # create log folder for searched items
        if [ ! -d "/config/huntarr/$settingsFileName/$arrApp" ]; then
            mkdir -p "/config/huntarr/$settingsFileName/$arrApp"
            chown ${PUID:-1000}:${PGID:-1000} "/config/huntarr/$settingsFileName/$arrApp"
        fi

        # create log of searched item
        if [ ! -f "/config/huntarr/$settingsFileName/$arrApp/$lockFileId" ]; then
            touch "/config/huntarr/$settingsFileName/$arrApp/$lockFileId"
            chown ${PUID:-1000}:${PGID:-1000} "/config/huntarr/$settingsFileName/$arrApp/$lockFileId"
        fi        
    done
}

# Wrapper for QueueCleanerProcess to handle newer Sonarr APIs where stalled torrents are listed as warnings
QueueCleanerProcess () {
  arrApp="$1"

  # Sonarr
  if [ "$arrApp" = "sonarr" ]; then
    arrUrl="$sonarrUrl"
    arrApiKey="$sonarrApiKey"
    arrApiVersion="v3"
    arrQueueData="$(curl -s "$arrUrl/api/$arrApiVersion/queue?page=1&pagesize=200&sortDirection=descending&sortKey=progress&includeUnknownSeriesItems=true&apikey=${arrApiKey}" | jq -r .records[])"
  fi

  # Sonarr
  if [ "$arrApp" = "sonarr-anime" ]; then
    arrUrl="$sonarranimeUrl"
    arrApiKey="$sonarranimeApiKey"
    arrApiVersion="v3"
    arrQueueData="$(curl -s "$arrUrl/api/$arrApiVersion/queue?page=1&pagesize=200&sortDirection=descending&sortKey=progress&includeUnknownSeriesItems=true&apikey=${arrApiKey}" | jq -r .records[])"
  fi

  # Radarr
  if [ "$arrApp" = "radarr" ]; then
    arrUrl="$radarrUrl"
    arrApiKey="$radarrApiKey"
    arrApiVersion="v3"
    arrQueueData="$(curl -s "$arrUrl/api/$arrApiVersion/queue?page=1&pagesize=200&sortDirection=descending&sortKey=progress&includeUnknownMovieItems=true&apikey=${arrApiKey}" | jq -r .records[])"
  fi

  # Lidarr
  if [ "$arrApp" = "lidarr" ]; then
    arrUrl="$lidarrUrl"
    arrApiKey="$lidarrApiKey"
    arrApiVersion="v1"
    arrQueueData="$(curl -s "$arrUrl/api/$arrApiVersion/queue?page=1&pagesize=200&sortDirection=descending&sortKey=progress&includeUnknownArtistItems=true&apikey=${arrApiKey}" | jq -r .records[])"
  fi

  arrQueueIdCount=$(echo "$arrQueueData" | jq -r ".id" | wc -l)
  # Exclude TBA items from the "Completed/Warning" cleanup list
  arrQueueCompletedIds=$(echo "$arrQueueData" | jq -r 'select(.status=="completed") | select(.trackedDownloadStatus=="warning") | select(.statusMessages | tostring | contains("TBA") | not) | .id')
  arrQueueIdsCompletedCount=$(echo "$arrQueueCompletedIds" | wc -w)
  arrQueueFailedIds=$(echo "$arrQueueData" | jq -r 'select(.status=="failed") | .id')
  arrQueueIdsFailedCount=$(echo "$arrQueueData" | jq -r 'select(.status=="failed") | .id' | wc -l)
  
  # OVERRIDE: Also target items that have status=="warning" but errorMessage contains "stalled"
  arrQueueStalledIds=$(echo "$arrQueueData" | jq -r 'select(.status=="stalled" or (.status=="warning" and (.errorMessage | tostring | contains("stalled")))) | .id')
  arrQueueIdsStalledount=$(echo "$arrQueueStalledIds" | wc -w)
  
  arrQueuedIds=$(echo "$arrQueueCompletedIds"; echo "$arrQueueFailedIds"; echo "$arrQueueStalledIds")
  arrQueueIdsCount=$(( $arrQueueIdsCompletedCount + $arrQueueIdsFailedCount + $arrQueueIdsStalledount ))

  if [ $arrQueueIdsCount -eq 0 ]; then
    log "$arrApp :: No items in queue to clean up"
  else
    for queueId in $(echo $arrQueuedIds); do
      # Avoid trying to parse empty strings or spaces from the variables
      if [ ! -z "$queueId" ]; then
        arrQueueItemData="$(echo "$arrQueueData" | jq -r "select(.id==$queueId)")"
        arrQueueItemTitle="$(echo "$arrQueueItemData" | jq -r .title)"
        log "$arrApp :: $queueId ($arrQueueItemTitle) :: Removing Failed/Stalled Queue Item..."
        deleteItem=$(curl -sX DELETE "$arrUrl/api/$arrApiVersion/queue/$queueId?removeFromClient=$removeFromClient&blocklist=$blocklist&skipRedownload=$skipRedownload&changeCategory=false&apikey=${arrApiKey}")
      fi
    done
  fi
}